<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD_Pack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.min.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>

    <!-- ══════════════════════════════════════
         NAVBAR
    ══════════════════════════════════════ -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="#" class="nav-logo" data-page="home">
                <div class="nav-logo-icon">MD</div>
                <span class="nav-logo-text">MD_Pack</span>
            </a>
            <div class="nav-links">
                <a href="#" class="nav-link" data-page="home">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M3 10.5L10 3l7 7.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1v-6.5z"/>
                    </svg>
                    Strona główna
                </a>
                <a href="#" class="nav-link" data-page="instalacja">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M10 3v10M6 9l4 4 4-4M4 16h12"/>
                    </svg>
                    Instalacja
                </a>
                <a href="#" class="nav-link active" data-page="dodatki">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="3" width="6" height="6" rx="1"/>
                        <rect x="11" y="3" width="6" height="6" rx="1"/>
                        <rect x="3" y="11" width="6" height="6" rx="1"/>
                        <rect x="11" y="11" width="6" height="6" rx="1"/>
                    </svg>
                    Dodatki
                </a>
                <a href="#" class="nav-link" data-page="faq">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                        <circle cx="10" cy="10" r="8"/>
                        <path d="M10 14v-1"/>
                        <path d="M10 10c0-2 3-2 3-4a3 3 0 0 0-6 0"/>
                    </svg>
                    FAQ
                </a>
            </div>
        </div>
    </nav>

    <!-- ══════════════════════════════════════
         PAGE: STRONA GŁÓWNA
    ══════════════════════════════════════ -->
    <div class="page" id="page-home">
        <div class="home-hero">
            <div class="home-hero-logo">MD</div>
            <h1 class="home-title">MD_Pack</h1>
            <p class="home-subtitle">Zestaw dodatków Margonem [NI]</p>
            <div class="home-actions">
                <button class="btn-primary" data-page="instalacja">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 3v10M6 9l4 4 4-4M4 16h12"/>
                    </svg>
                    Instalacja
                </button>
                <button class="btn-secondary" data-page="dodatki">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="6" height="6" rx="1"/>
                        <rect x="11" y="3" width="6" height="6" rx="1"/>
                        <rect x="3" y="11" width="6" height="6" rx="1"/>
                        <rect x="11" y="11" width="6" height="6" rx="1"/>
                    </svg>
                    Przeglądaj dodatki
                </button>
            </div>
        </div>

        <div class="changelog-wrap">
            <div class="changelog-header">
                <h2 class="changelog-title">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M10 2a8 8 0 100 16A8 8 0 0010 2z"/>
                        <path d="M10 6v4l3 2"/>
                    </svg>
                    Aktualności
                </h2>
            </div>
            <div class="changelog-list" id="changelogList"></div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         PAGE: INSTALACJA
    ══════════════════════════════════════ -->
    <div class="page" id="page-instalacja">
        <div class="page-header">
            <h1>Instalacja</h1>
        </div>
        <div class="static-content">
            <div class="info-card">
                <h2>Jak zainstalować dodatki?</h2>
                <p>Treść instrukcji instalacji zostanie uzupełniona wkrótce.</p>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         PAGE: DODATKI
    ══════════════════════════════════════ -->
    <div class="page active" id="page-dodatki">
        <div class="page-header">
            <h1>Dodatki</h1>
        </div>
        <div class="controls-bar">
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="8.5" cy="8.5" r="5.5"/>
                    <line x1="13" y1="13" x2="18" y2="18"/>
                </svg>
                <input type="text" id="search" placeholder="Szukaj…" autocomplete="off" spellcheck="false">
            </div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="no-results" id="noResults">Nie znaleziono żadnego dodatku.</div>
    </div>

    <!-- ══════════════════════════════════════
         PAGE: FAQ
    ══════════════════════════════════════ -->
    <div class="page" id="page-faq">
        <div class="page-header">
            <h1>FAQ</h1>
        </div>
        <div class="faq-controls">
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="8.5" cy="8.5" r="5.5"/>
                    <line x1="13" y1="13" x2="18" y2="18"/>
                </svg>
                <input type="text" id="faq-search" placeholder="Szukaj pytania…" autocomplete="off" spellcheck="false">
            </div>
        </div>
        <div class="faq-list" id="faqList"></div>
        <div class="no-results" id="faqNoResults">Nie znaleziono żadnego pytania.</div>
    </div>

    <!-- ══════════════════════════════════════
         MODAL (szczegóły dodatku)
    ══════════════════════════════════════ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal" role="dialog" aria-modal="true">
            <div class="modal-header">
                <div class="modal-header-info">
                    <div class="modal-title" id="modalTitle"></div>
                    <div class="modal-subtitle" id="modalSubtitle"></div>
                </div>
                <div class="modal-header-right">
                    <div class="modal-tags" id="modalTags"></div>
                    <button class="modal-close" id="modalClose" aria-label="Zamknij">
                        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                            <line x1="1" y1="1" x2="13" y2="13"/>
                            <line x1="13" y1="1" x2="1" y2="13"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="bundle.js"></script>
</body>
</html>
